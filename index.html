<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ферма</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="background:#0a0a14;color:#fff;font-family:sans-serif;margin:0;padding:10px 10px 70px;">

<script>
// Telegram ID или гостевой
var tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
var uid = tg?.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : localStorage.getItem('uid') || 'user_' + Math.floor(Math.random()*999999);
localStorage.setItem('uid', uid);
var ADMIN = '8684827145';

// Покажем ID
document.write('<div style="background:#12122a;padding:8px;border-radius:10px;margin-bottom:10px;text-align:center">🆔 ' + uid + '</div>');

// Баланс
document.write('<div style="display:flex;gap:6px;margin-bottom:10px">');
document.write('<div style="flex:1;background:#12122a;padding:10px;border-radius:10px;text-align:center"><small>Монеты</small><br><b style="color:#ffc107;font-size:18px" id="coins">0</b></div>');
document.write('<div style="flex:1;background:#12122a;padding:10px;border-radius:10px;text-align:center"><small>TON</small><br><b style="color:#0f0;font-size:18px" id="ton">0.00</b></div>');
document.write('<div style="flex:1;background:#12122a;padding:10px;border-radius:10px;text-align:center"><small>Энергия</small><br><b style="color:#0ff;font-size:18px" id="stam">100/100</b></div>');
document.write('</div>');

// Меню
document.write('<div id="menu" style="position:fixed;bottom:0;left:0;right:0;background:#111;display:flex;height:55px;z-index:10">');
['🌾Ферма','🏪Бусты','📋Задан','🎁Бонус','📈Биржа','👤Проф'].forEach(function(n,i){
    document.write('<div onclick="showPage('+i+')" style="flex:1;text-align:center;padding:5px;font-size:8px;color:#999;cursor:pointer" id="nav'+i+'">'+n+'</div>');
});
if (uid === ADMIN) document.write('<div onclick="showPage(6)" style="flex:1;text-align:center;padding:5px;font-size:8px;color:#999;cursor:pointer" id="nav6">👑Адм</div>');
document.write('</div>');

// Страницы
document.write('<div id="page0"><div style="text-align:center;margin-top:20px"><button onclick="clickFarm(event)" style="width:140px;height:140px;border-radius:50%;border:3px solid #7c3aed;background:#1a1a40;color:#ffc107;font-size:16px;cursor:pointer">🌾<br>СОБРАТЬ</button><p style="color:#0ff;margin-top:10px">+<span id="cp">1</span> монет | Пассив: <span id="pi">выкл</span></p><p id="bi" style="color:#ffc107"></p></div></div>');

document.write('<div id="page1" style="display:none"><h3>Улучшения</h3><p>TON: <b id="ut">0.00</b></p><div id="upgrades"></div></div>');
document.write('<div id="page2" style="display:none"><h3>Задания</h3><div id="tasks"></div></div>');
document.write('<div id="page3" style="display:none"><h3>Бонусы</h3><p>Промокод: <input id="promo" placeholder="Код" style="padding:8px;background:#000;border:1px solid #333;border-radius:8px;color:#fff"><button onclick="usePromo()" style="background:#ffc107;color:#000;padding:8px;border:none;border-radius:8px;cursor:pointer">Акт.</button></p><p>Реф. ссылка: <span id="ref"></span> <button onclick="copyRef()" style="background:#7c3aed;color:#fff;padding:5px;border:none;border-radius:8px;cursor:pointer;font-size:10px">Копир.</button></p><p>Приглашено: <b id="rc">0</b> | +<b id="re">0</b> монет</p><h4>Топ-20</h4><div id="cup"></div></div>');
document.write('<div id="page4" style="display:none"><h3>Биржа</h3><p style="text-align:center"><b id="rate">1M</b> монет = 1 TON<br><span style="color:#0f0" id="pct">+0%</span></p><p>Монет: <input id="swap" type="number" value="100000" style="padding:8px;background:#000;border:1px solid #333;border-radius:8px;color:#fff;width:100%"> = <span id="st" style="color:#0f0">0.10</span> TON</p><button onclick="sell()" style="background:#0f0;color:#000;padding:10px;border:none;border-radius:10px;width:100%;margin:5px 0;cursor:pointer;font-weight:bold">Продать</button><button onclick="buy()" style="background:#ffc107;color:#000;padding:10px;border:none;border-radius:10px;width:100%;cursor:pointer;font-weight:bold">Купить</button></div>');
document.write('<div id="page5" style="display:none"><h3>Профиль</h3><p style="text-align:center;font-size:20px;color:#ffc107"><b id="pg">0</b> монет</p><p style="text-align:center;color:#0f0"><b id="pt">0.00</b> TON</p><p><b>Пополнение</b><br>Мин: 0.1 TON</p><p style="background:#000;padding:8px;border-radius:8px;word-break:break-all;color:#ffc107;font-size:10px">UQDmNY1TIMIgnALOpAyJ4_XO2uroUNLFVRwGie5AEwzccaps</p><button onclick="copyWallet()" style="background:#7c3aed;color:#fff;padding:10px;border:none;border-radius:10px;width:100%;cursor:pointer;font-weight:bold">Копировать</button><p style="font-size:10px;color:#ffc107">ID: ' + uid + '</p><p><b>Вывод TON</b><br>Мин: 0.5 TON</p><input id="wa" placeholder="Сумма" style="padding:8px;background:#000;border:1px solid #333;border-radius:8px;color:#fff;width:100%"><input id="ww" placeholder="Кошелёк UQ..." style="padding:8px;background:#000;border:1px solid #333;border-radius:8px;color:#fff;width:100%;margin-top:5px"><button onclick="wd()" style="background:#ff1744;color:#fff;padding:10px;border:none;border-radius:10px;width:100%;margin-top:5px;cursor:pointer;font-weight:bold">Вывести</button></div>');

if (uid === ADMIN) {
    document.write('<div id="page6" style="display:none"><h3 style="color:#7c3aed">Админ</h3><p>ID: <input id="ai" placeholder="ID" style="padding:8px;background:#000;border:1px solid #333;border-radius:8px;color:#fff;width:100%"> Монеты: <input id="ag" placeholder="Монеты" style="padding:8px;background:#000;border:1px solid #333;border-radius:8px;color:#fff;width:100%"> TON: <input id="at" placeholder="TON" style="padding:8px;background:#000;border:1px solid #333;border-radius:8px;color:#fff;width:100%"><button onclick="as()" style="background:#7c3aed;color:#fff;padding:10px;border:none;border-radius:10px;width:100%;margin-top:5px;cursor:pointer;font-weight:bold">Применить</button></p><p>Блок: <input id="blid" placeholder="ID" style="padding:8px;background:#000;border:1px solid #333;border-radius:8px;color:#fff;width:100%"><button onclick="bl()" style="background:#ff1744;color:#fff;padding:10px;border:none;border-radius:10px;width:100%;margin-top:5px;cursor:pointer;font-weight:bold">Блок/Разблок</button></p><p>Промокод: <input id="pcode" placeholder="Код" style="padding:8px;background:#000;border:1px solid #333;border-radius:8px;color:#fff;width:100%"> Монет: <input id="pgms" placeholder="Монет" style="padding:8px;background:#000;border:1px solid #333;border-radius:8px;color:#fff;width:100%"> Акт.: <input id="pmax" placeholder="Активаций" style="padding:8px;background:#000;border:1px solid #333;border-radius:8px;color:#fff;width:100%"><button onclick="pc()" style="background:#ffc107;color:#000;padding:10px;border:none;border-radius:10px;width:100%;margin-top:5px;cursor:pointer;font-weight:bold">Создать</button></p><p>Задание: <select id="ttype" style="padding:8px;background:#000;border:1px solid #333;border-radius:8px;color:#fff;width:100%"><option value="channel">Канал</option><option value="chat">Чат</option><option value="bot">Бот</option></select> <input id="tlink" placeholder="t.me/..." style="padding:8px;background:#000;border:1px solid #333;border-radius:8px;color:#fff;width:100%"> <input id="tgms" placeholder="Монет" style="padding:8px;background:#000;border:1px solid #333;border-radius:8px;color:#fff;width:100%"><button onclick="ta()" style="background:#ffc107;color:#000;padding:10px;border:none;border-radius:10px;width:100%;margin-top:5px;cursor:pointer;font-weight:bold">Добавить</button></p></div>');
}

// ДАННЫЕ
var D = JSON.parse(localStorage.getItem('fd') || '{"u":{},"t":[],"p":[],"bl":[],"h":[1000000,1010000,1020000],"tot":0}');
if (!D.u[uid]) D.u[uid] = {c:0,tn:0.5,s:100,ms:100,cl:0,pl:0,bm:1,be:0,dn:[],up:[],tm:{},rf:0,re:0};
var U = D.u[uid], rate = 1000000;

function S() { D.u[uid] = U; localStorage.setItem('fd', JSON.stringify(D)); R(); }

function R() {
    if (D.bl.includes(uid)) { document.body.innerHTML = '<h1 style="color:red;text-align:center;padding:50px">ЗАБЛОКИРОВАН</h1>'; return; }
    document.getElementById('coins').innerText = Math.floor(U.c).toLocaleString();
    document.getElementById('ton').innerText = U.tn.toFixed(2);
    document.getElementById('stam').innerText = Math.floor(U.s) + '/' + U.ms;
    document.getElementById('pg').innerText = Math.floor(U.c).toLocaleString();
    document.getElementById('pt').innerText = U.tn.toFixed(2);
    document.getElementById('ut').innerText = U.tn.toFixed(2);
    document.getElementById('rc').innerText = U.rf || 0;
    document.getElementById('re').innerText = Math.floor(U.re || 0);
    document.getElementById('ref').innerText = 'https://t.me/bot?start=ref_' + uid;
    document.getElementById('cp').innerText = 1 + (U.cl > 0 ? [1,2,5,10,25,50][U.cl-1] : 0);
    document.getElementById('pi').innerText = U.pl > 0 ? '1/' + [20,15,10,5,1][U.pl-1] + 'с' : 'выкл';
    if (U.be > Date.now()) document.getElementById('bi').innerText = '🔥 x' + U.bm + ' (' + Math.ceil((U.be-Date.now())/1000) + 'с)';
    else { U.bm = 1; document.getElementById('bi').innerText = ''; }
    rate = Math.max(300000, 1000000 - Math.floor(D.tot / 5000));
    document.getElementById('rate').innerText = (rate/1000000).toFixed(1) + 'M';
    document.getElementById('pct').innerText = '+2%';
    
    // Улучшения
    var cc = [0.1,0.5,1,2,5,10], cg = [1,2,5,10,25,50], cn = ['Бронза','Серебро','Золото','Миф','Легенда','Космос'];
    var h = '';
    for (var i = 0; i < cc.length; i++) h += '<div style="display:flex;justify-content:space-between;padding:6px;background:#000;border-radius:6px;margin:3px 0">' + cn[i] + ' +' + cg[i] + ' ' + (U.cl > i ? '✅' : U.cl === i ? '<button onclick="buyC('+i+')" style="background:#0ff;color:#000;padding:4px 8px;border:none;border-radius:6px;cursor:pointer;font-size:10px">'+cc[i]+' TON</button>' : '🔒') + '</div>';
    document.getElementById('upgrades').innerHTML = h + '<h4>Энергия</h4>';
    var sc = [0.1,0.3,0.5,1,2], sg = [50,100,200,500,1000];
    for (var i = 0; i < sc.length; i++) document.getElementById('upgrades').innerHTML += '<div style="display:flex;justify-content:space-between;padding:6px;background:#000;border-radius:6px;margin:3px 0">+'+sg[i]+' макс ' + (U.ms >= 100+sg[i] ? '✅' : '<button onclick="buyS('+i+')" style="background:#0ff;color:#000;padding:4px 8px;border:none;border-radius:6px;cursor:pointer;font-size:10px">'+sc[i]+' TON</button>') + '</div>';
    document.getElementById('upgrades').innerHTML += '<h4>Пассив</h4>';
    var pc = [0.1,0.5,1,2,5], pi = [20,15,10,5,1], pn = ['Робот','Мех','Фабрика','Станция','Дыра'];
    for (var i = 0; i < pc.length; i++) document.getElementById('upgrades').innerHTML += '<div style="display:flex;justify-content:space-between;padding:6px;background:#000;border-radius:6px;margin:3px 0">'+pn[i]+' 1/'+pi[i]+'с ' + (U.pl > i ? '✅' : U.pl === i ? '<button onclick="buyP('+i+')" style="background:#0ff;color:#000;padding:4px 8px;border:none;border-radius:6px;cursor:pointer;font-size:10px">'+pc[i]+' TON</button>' : '🔒') + '</div>';
    document.getElementById('upgrades').innerHTML += '<h4>Бустеры</h4><div style="display:flex;justify-content:space-between;padding:6px;background:#000;border-radius:6px;margin:3px 0">x5 (30с) <button onclick="buyB(5,30,0.1)" style="background:#0ff;color:#000;padding:4px 8px;border:none;border-radius:6px;cursor:pointer;font-size:10px">0.1 TON</button></div><div style="display:flex;justify-content:space-between;padding:6px;background:#000;border-radius:6px;margin:3px 0">x10 (1м) <button onclick="buyB(10,60,0.5)" style="background:#0ff;color:#000;padding:4px 8px;border:none;border-radius:6px;cursor:pointer;font-size:10px">0.5 TON</button></div>';

    // Задания
    var tb = document.getElementById('tasks');
    if (!D.t.length) tb.innerHTML = '<p style="color:#999;text-align:center">Нет заданий</p>';
    else {
        tb.innerHTML = '';
        for (var i = 0; i < D.t.length; i++) {
            var t = D.t[i], dn = U.dn.includes(t.id), tm = U.tm[t.id];
            if (dn) tb.innerHTML += '<div style="display:flex;justify-content:space-between;padding:6px;background:#000;border-radius:6px;margin:3px 0">'+t.lk+' +'+t.g+' <span style="color:#0f0">✅</span></div>';
            else if (tm && Date.now() > tm) tb.innerHTML += '<div style="display:flex;justify-content:space-between;padding:6px;background:#000;border-radius:6px;margin:3px 0">'+t.lk+' +'+t.g+' <button onclick="claimT(\''+t.id+'\')" style="background:#0f0;color:#000;padding:4px 8px;border:none;border-radius:6px;cursor:pointer;font-size:10px">Забрать</button></div>';
            else if (tm) tb.innerHTML += '<div style="display:flex;justify-content:space-between;padding:6px;background:#000;border-radius:6px;margin:3px 0">'+t.lk+' +'+t.g+' ⏳ '+Math.ceil((tm-Date.now())/1000)+'с</div>';
            else tb.innerHTML += '<div style="display:flex;justify-content:space-between;padding:6px;background:#000;border-radius:6px;margin:3px 0">'+t.lk+' +'+t.g+' <button onclick="startT(\''+t.id+'\')" style="background:#0ff;color:#000;padding:4px 8px;border:none;border-radius:6px;cursor:pointer;font-size:10px">✅</button></div>';
        }
    }

    // Кубок
    var arr = [];
    for (var id in D.u) { if (!D.bl.includes(id) && D.u[id].c > 0) arr.push({id:id,c:D.u[id].c}); }
    arr.sort(function(a,b){return b.c-a.c}); arr = arr.slice(0,20);
    var cb = document.getElementById('cup');
    cb.innerHTML = arr.length ? arr.map(function(u,i){return '<div style="display:flex;justify-content:space-between;padding:4px;background:#000;border-radius:4px;margin:2px 0;font-size:11px">'+(i<3?['🥇','🥈','🥉'][i]:'#'+(i+1))+' '+u.id+' <b>'+Math.floor(u.c).toLocaleString()+'</b></div>';}).join('') : '<p style="color:#999">Нет</p>';
}

// Функции
function clickFarm(e) { if (D.bl.includes(uid) || U.s < 1) return; U.s--; var er = (1+(U.cl>0?[1,2,5,10,25,50][U.cl-1]:0))*U.bm; U.c += er; D.tot += er; S(); }
function buyC(i) { if (U.cl !== i || U.tn < [0.1,0.5,1,2,5,10][i]) return; U.tn -= [0.1,0.5,1,2,5,10][i]; U.cl++; S(); }
function buyS(i) { if (U.tn < [0.1,0.3,0.5,1,2][i]) return; U.tn -= [0.1,0.3,0.5,1,2][i]; U.ms += [50,100,200,500,1000][i]; S(); }
function buyP(i) { if (U.pl !== i || U.tn < [0.1,0.5,1,2,5][i]) return; U.tn -= [0.1,0.5,1,2,5][i]; U.pl++; S(); }
function buyB(m,d,c) { if (U.tn < c) return; U.tn -= c; U.bm = m; U.be = Date.now()+d*1000; S(); }
function startT(id) { var t = D.t.find(function(x){return x.id===id}); if (!t) return; window.open('https://'+t.lk,'_blank'); U.tm[id] = Date.now()+5000; S(); }
function claimT(id) { var t = D.t.find(function(x){return x.id===id}); if (!t) return; U.dn.push(id); U.c += t.g; D.tot += t.g; delete U.tm[id]; S(); }
function usePromo() { var c = document.getElementById('promo').value.trim() || prompt('Код:'); if (!c) return; var p = D.p.find(function(x){return x.c===c.toUpperCase()}); if (!p) return alert('❌'); if (p.u.includes(uid)) return alert('⚠️'); if (p.u.length >= p.m) return alert('⚠️'); p.u.push(uid); U.c += p.g; S(); alert('+'+p.g); }
function sell() { var g = parseInt(document.getElementById('swap').value); if (isNaN(g) || g < 100000 || g > U.c) return; U.c -= g; U.tn += g/rate*0.95; D.tot -= g; S(); }
function buy() { var g = parseInt(document.getElementById('swap').value); if (isNaN(g) || g < 100000) return; var t = g/rate; if (t > U.tn) return; U.tn -= t; U.c += g; D.tot += g; S(); }
function copyWallet() { navigator.clipboard.writeText('UQDmNY1TIMIgnALOpAyJ4_XO2uroUNLFVRwGie5AEwzccaps'); alert('✅'); }
function copyRef() { navigator.clipboard.writeText(document.getElementById('ref').innerText); alert('✅'); }
function wd() { var a = parseFloat(document.getElementById('wa').value), w = document.getElementById('ww').value.trim(); if (isNaN(a) || a < 0.5) return; var n = a*rate/0.95; if (n > U.c) return; if (!w.startsWith('UQ')) return; U.c -= n; S(); alert('✅'); }
function as() { var id = document.getElementById('ai').value.trim(), dg = parseInt(document.getElementById('ag').value) || 0, dt = parseFloat(document.getElementById('at').value) || 0; if (!id) return; if (!D.u[id]) D.u[id] = {c:0,tn:0,s:100,ms:100,cl:0,pl:0,bm:1,be:0,dn:[],up:[],tm:{},rf:0,re:0}; D.u[id].c += dg; D.u[id].tn += dt; if (id === uid) U = D.u[id]; S(); alert('✅'); }
function bl() { var id = document.getElementById('blid').value.trim(); if (!id) return; if (D.bl.includes(id)) { D.bl = D.bl.filter(function(x){return x!==id}); alert('🔓'); } else { D.bl.push(id); alert('🔒'); } S(); }
function pc() { var c = document.getElementById('pcode').value.trim().toUpperCase(), g = parseInt(document.getElementById('pgms').value), m = parseInt(document.getElementById('pmax').value); if (!c || !g || !m) return; D.p.push({c:c,g:g,m:m,u:[]}); S(); alert('✅'); }
function ta() { var l = document.getElementById('tlink').value.trim(), g = parseInt(document.getElementById('tgms').value); if (!l.startsWith('t.me/') || !g) return; D.t.push({id:Date.now().toString(),ty:document.getElementById('ttype').value,lk:l,g:g}); S(); alert('✅'); }

function showPage(n) {
    for (var i = 0; i <= 6; i++) { var p = document.getElementById('page'+i); if (p) p.style.display = 'none'; }
    var p = document.getElementById('page'+n); if (p) p.style.display = 'block';
    for (var i = 0; i <= 6; i++) { var nav = document.getElementById('nav'+i); if (nav) nav.style.color = i === n ? '#7c3aed' : '#999'; }
}

setInterval(function() {
    if (D.bl.includes(uid)) return;
    if (U.s < U.ms) U.s = Math.min(U.ms, U.s + 1);
    if (U.pl > 0) { var iv = [20,15,10,5,1][U.pl-1]; U.c += (1/iv)*U.bm; D.tot += (1/iv); }
    S();
}, 10000);

R();
</script>
</body>
</html>
