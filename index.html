<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Клик-Бот</title>
    <style>
        /* Стили (CSS) теперь внутри тега style */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            font-family: sans-serif;
            margin: 0;
        }
        .container { text-align: center; }
        button {
            padding: 20px 40px;
            font-size: 20px;
            background-color: #e74c3c;
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Мои монеты: <span id="score">0</span></h1>
        <button id="clickButton">Кликни меня!</button>
    </div>

    <script>
        // Логика (JavaScript) теперь внутри тега script
        let count = 0;
        const button = document.getElementById('clickButton');
        const scoreDisplay = document.getElementById('score');

        button.addEventListener('click', () => {
            count++;
            scoreDisplay.innerText = count;
        });
    </script>

</body>
</html>
