<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Ферма ZZ</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
background:#080812;
color:white;
font-family:Arial;
text-align:center;
padding:15px;
}
.card{
background:#15152b;
padding:15px;
border-radius:20px;
margin:15px;
}
.coin{
font-size:30px;
color:#ffd000;
}
button{
background:#7c3cff;
color:white;
border:0;
padding:15px;
border-radius:20px;
width:90%;
margin:10px;
font-weight:bold;
}
.click{
width:160px;
height:160px;
border-radius:50%;
background:#22224a;
border:5px solid #7c3cff;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
padding:10px;
}
</style>

</head>

<body>

<h1>🌾 Ферма ZZ</h1>

<div class="card">

🪙 ZZ Coin

<div class="coin" id="coins">
0
</div>

⚡ Энергия:
<span id="energy">100</span>

<br><br>

⭐ LVL:
<span id="lvl">1</span>

<br>

XP:
<span id="xp">0</span>/100

</div>


<div class="click" onclick="farm()">
🚀
</div>

<button onclick="bonus()">
🎁 Бонус +500 ZZ
</button>


<div class="card">

<h3>🚀 Бусты</h3>

<button onclick="upgrade()">
Улучшить клик
</button>

Сила:
<span id="power">1</span>

</div>


<div class="card">

<h3>👥 Друзья</h3>

Твоя ссылка:

<br>

<small id="ref"></small>

</div>



<script>

let coins=Number(localStorage.getItem("coins"))||0;
let xp=Number(localStorage.getItem("xp"))||0;
let lvl=Number(localStorage.getItem("lvl"))||1;
let power=Number(localStorage.getItem("power"))||1;
let energy=Number(localStorage.getItem("energy"))||100;


function save(){

localStorage.setItem("coins",coins);
localStorage.setItem("xp",xp);
localStorage.setItem("lvl",lvl);
localStorage.setItem("power",power);
localStorage.setItem("energy",energy);

}


function update(){

document.getElementById("coins").innerHTML=coins;
document.getElementById("xp").innerHTML=xp;
document.getElementById("lvl").innerHTML=lvl;
document.getElementById("power").innerHTML=power;
document.getElementById("energy").innerHTML=energy;

}


function farm(){

if(energy<=0)return;

coins+=power;
xp++;
energy--;

if(xp>=100){

lvl++;
xp=0;
alert("🎉 Новый уровень!");

}

save();
update();

}


function bonus(){

coins+=500;
save();
update();

}


function upgrade(){

if(coins>=1000){

coins-=1000;
power++;

save();
update();

}

}


let tg=window.Telegram?.WebApp;

if(tg){

tg.ready();
tg.expand();

}


document.getElementById("ref").innerHTML=
"t.me/your_bot?start="+Date.now();


update();

</script>

</body>
</html>
